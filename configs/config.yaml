# Basic directory settings
source_directory: "/Users/jack/tmp/2024-11-27"
target_directory: "/Users/jack/tmp/2024-11-27-backup"
folders_to_backup:
  - "Packers"
  - "Photos-001"
  - "photos"

# Performance settings
concurrency: 2
buffer_size: 32768
